<!DOCTYPE html>
<html>
<head>
    <title>Hangman Game</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Hangman Game</h1>

    <h2>{{ word }}</h2>

    <p>Guessed Letters: {{ guessed }}</p>
    <p>Guesses Left: {{ guesses_left }}</p>

{% if won %}

<h2 class="win">🎉 Congratulations! You guessed the word correctly!</h2>

<a href="/next">
    <button class="next-btn">Next Game</button>
</a>

{% elif lost %}

<h2 class="lose">😢 Game Over!</h2>

<a href="/next">
    <button class="next-btn" autofocus>Next Game</button>
</a>

{% else %}

<form method="POST">
    <input type="text" name="letter" maxlength="1" required autofocus>
    <button type="submit">Guess</button>
</form>

{% endif %}
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
